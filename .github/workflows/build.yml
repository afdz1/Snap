name: Build & Release

# Trigger on version tags:  git tag v1.0.1 && git push --tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install -r companion/requirements.txt
          pip install pyinstaller Pillow

      # ── Inject secrets into bot_secrets.py ────────────────────────────────
      # Store DISCORD_BOT_TOKEN and DISCORD_CHANNEL_ID in your GitHub repo's
      # Settings → Secrets and variables → Actions.
      - name: Write bot_secrets.py from GitHub Secrets
        shell: pwsh
        run: |
          @"
          # Auto-generated by GitHub Actions — do not edit.
          BOT_TOKEN  = "${{ secrets.DISCORD_BOT_TOKEN }}"
          CHANNEL_ID = ${{ secrets.DISCORD_CHANNEL_ID }}
          "@ | Out-File -FilePath companion/bot_secrets.py -Encoding utf8

      # ── Generate icons ────────────────────────────────────────────────────
      - name: Generate addon icons (PNG + ICO)
        run: python build_icon.py

      # ── PyInstaller ───────────────────────────────────────────────────────
      - name: Build Snap.exe
        run: pyinstaller snap.spec

      # ── Publish release ───────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Snap.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

